<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Interface | Lakshya Scholarship Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Poppins:wght@400;500;600&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <span>THE LAKSHYA ACADEMY</span>
            </div>
            <div style="font-family: 'Montserrat', sans-serif; font-weight: 700; color: var(--accent-gold);">
                Scholarship Test 2026-27
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="test-layout">
            
            <!-- Left Column: Question Area -->
            <div class="main-column">
                
                <div class="passage-container" id="passageContainer">
                    <h3 style="margin-bottom: 10px; font-size: 1.1rem;">Reading Comprehension Passage</h3>
                    <p id="passageText" style="line-height: 1.8; color: var(--text-dark);"></p>
                </div>

                <div class="question-card">
                    <div style="display: flex; justify-content: space-between; align-items: start;">
                        <span class="section-pill" id="questionSection">Section A — English</span>
                        <button id="togglePassageBtn" class="btn btn-secondary" style="padding: 5px 10px; font-size: 0.8rem; display: none;">📖 Show Passage</button>
                    </div>

                    <div class="question-meta">
                        <span class="question-number-display" id="questionNumber">Question 1 of 100</span>
                    </div>

                    <div class="question-text" id="questionText">Loading question...</div>

                    <div class="options-container" id="optionsContainer">
                        <!-- Options generated by JS -->
                    </div>

                    <div class="actions-row">
                        <button id="prevBtn" class="btn btn-secondary">← Previous</button>
                        
                        <label class="review-toggle">
                            <input type="checkbox" id="markReview"> Mark for Review
                        </label>
                        
                        <div>
                            <button id="clearBtn" class="btn btn-secondary" style="margin-right: 10px;">Clear Answer</button>
                            <button id="nextBtn" class="btn btn-primary">Save & Next →</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Palette & Timer -->
            <div class="test-sidebar">
                
                <div class="timer-card">
                    <div class="title">Time Remaining</div>
                    <div class="timer-display" id="timerDisplay">90 : 00 : 00</div>
                </div>

                <div class="palette-card">
                    <h3 style="margin-bottom: 15px; font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 10px;">Question Palette</h3>
                    
                    <div class="palette-legend">
                        <div class="legend-item">
                            <div class="legend-color" style="background: var(--success);"></div> Answered
                        </div>
                        <div class="legend-item">
                            <div class="legend-color" style="background: var(--warning);"></div> Marked
                        </div>
                        <div class="legend-item">
                            <div class="legend-color" style="background: var(--accent-maroon);"></div> Ans + Marked
                        </div>
                        <div class="legend-item">
                            <div class="legend-color" style="border: 1px solid var(--border); background: #fff;"></div> Not Attempted
                        </div>
                    </div>

                    <div class="palette-grid" id="paletteGrid">
                        <!-- Buttons generated by JS -->
                    </div>

                    <button id="finalSubmitBtn" class="btn btn-danger" style="width: 100%; margin-top: 20px;">Submit Final Test</button>
                </div>
            </div>
            
        </div>
    </div>

    <!-- Full screen loader -->
    <div class="loader-overlay" id="loader">
        <div class="spinner"></div>
        <p style="font-weight: 600; color: var(--primary-navy);">Submitting Your Test...</p>
        <p style="font-size: 0.9rem; color: var(--text-muted);">Please do not refresh or close the tab.</p>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/questions.js"></script>
    <script src="assets/js/test.js"></script>
</body>
</html>
